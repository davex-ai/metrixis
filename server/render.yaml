services:
  # ── API server (Express) ──
  - type: web
    name: metrixis-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: DATABASE_URL
        sync: false # set manually from Supabase connection string
      - key: SESSION_SECRET
        generateValue: true
      - key: DASHBOARD_URL
        value: https://metrixis.vercel.app
      - key: NODE_ENV
        value: production
      - key: PGSSL
        value: "true"

  # ── Daily aggregation job ──
  - type: cron
    name: metrixis-aggregate
    runtime: node
    plan: free
    buildCommand: npm install
    schedule: "10 0 * * *" # 00:10 UTC daily — after the previous day is fully over
    startCommand: node jobs/aggregate.js
    envVars:
      - key: DATABASE_URL
        sync: false # same Supabase connection string as the web service
      - key: SESSION_SECRET
        sync: false # not used by the job, but pool.js/collect.js reference it
      - key: PGSSL
        value: "true"
